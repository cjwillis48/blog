apiVersion: apps/v1
kind: Deployment
metadata:
  name: ghost
  namespace: blog
  labels:
    app: ghost
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ghost
  template:
    metadata:
      labels:
        app: ghost
    spec:
      automountServiceAccountToken: false
      nodeSelector:
        storage-tier: large
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: install-s3-adapter
          image: ghcr.io/cjwillis48/blog:latest
          imagePullPolicy: Always
          command: ["sh", "-c", "mkdir -p /var/lib/ghost/content/adapters/storage/s3 && cp -r /tmp/s3-adapter/* /var/lib/ghost/content/adapters/storage/s3/"]
          volumeMounts:
            - name: ghost-data
              mountPath: /var/lib/ghost/content
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
      containers:
        - name: ghost
          image: ghcr.io/cjwillis48/blog:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 2368
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: mail__options__auth__pass
              valueFrom:
                secretKeyRef:
                  name: ghost-mail
                  key: password
            # Storage env vars temporarily removed for debugging
            # - name: storage__active
            #   value: s3
          volumeMounts:
            - name: ghost-data
              mountPath: /var/lib/ghost/content
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 500m
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /ghost/api/v4/admin/site/
              port: 2368
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ghost/api/v4/admin/site/
              port: 2368
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: ghost-data
          persistentVolumeClaim:
            claimName: ghost-data
